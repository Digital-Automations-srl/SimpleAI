version: 1.3.3

cache: true

interface:
  customWelcome: 'Welcome to Simple AI - Test - Digital Automations. Enjoy your experience.'
  fileSearch: true
  webSearch: true
  privacyPolicy:
    externalUrl: ''
    openNewTab: true
  termsOfService:
    externalUrl: ''
    openNewTab: true
    modalAcceptance: true
    modalTitle: 'Terms of Service'
    modalContent: |
      # Per i termini di utilizzo si rimanda al contratto generale
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents:
    use: true
    create: true
    share: true
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: true
  fileCitations: true

registration:
  socialLogins: []
  allowedDomains:
    - "digitalautomations.it"

balance:
  enabled: true
  startBalance: 1000000000
  autoRefillEnabled: false
  refillIntervalValue: 30
  refillIntervalUnit: 'days'
  refillAmount: 1000000000

transactions:
  enabled: true


fileConfig:
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 25
      totalSizeLimit: 100
      supportedMimeTypes:
        - application/pdf
        - text/plain
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        - application/vnd.openxmlformats-officedocument.presentationml.presentation
        - application/msword
        - application/vnd.ms-excel
        - application/vnd.ms-powerpoint
        - text/csv
    agents:
      fileLimit: 10
      fileSizeLimit: 25
      totalSizeLimit: 100
      supportedMimeTypes:
        - application/pdf
        - text/plain
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
        - application/vnd.openxmlformats-officedocument.presentationml.presentation
        - application/msword
        - application/vnd.ms-excel
        - application/vnd.ms-powerpoint
        - text/csv
  serverFileSizeLimit: 100
  avatarSizeLimit: 2

actions:
  allowedDomains:
    - 'swapi.dev'
    - 'librechat.ai'
    - 'google.com'

endpoints:

  azureOpenAI:
    titleModel: gpt-5
    plugins: true
    groups:
      - group: "Default"
        apiKey: "${AZURE_INSTANCE_KEY}"
        instanceName: "${AZURE_INSTANCE_NAME}"
        version: "${AZURE_API_VERSION}"
        models:
          gpt-5.2:
            deploymentName: gpt-5.2
          gpt-5.1:
            deploymentName: gpt-5.1
          gpt-5:
            deploymentName: gpt-5

  google:
    streamRate: 5
    titleModel: "gemini-2.5-flash"

  anthropic:
    streamRate: 20
    titleModel: "claude-haiku-4-5"
    titleMethod: "completion"
    vertex:
      region: "europe-west1"
      projectId: "simple-ai-saas-5"
      serviceKeyFile: "/api/data/auth.json"
      models:
        claude-sonnet-4-6:
          deploymentName: claude-sonnet-4-6
        claude-sonnet-4-5:
          deploymentName: claude-sonnet-4-5
        claude-opus-4-6:
          deploymentName: claude-opus-4-6
        claude-opus-4-5:
          deploymentName: claude-opus-4-5
        claude-haiku-4-5:
          deploymentName: claude-haiku-4-5

  agents:
    recursionLimit: 50
    maxRecursionLimit: 100
    disableBuilder: false
    maxCitations: 30
    maxCitationsPerFile: 7
    minRelevanceScore: 0.45
    capabilities: ["execute_code", "file_search", "web_search", "artifacts", "actions", "tools", "context", "chain", "ocr"]

webSearch:
  searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"
  searchProvider: "searxng"
  firecrawlApiKey: "${FIRECRAWL_API_KEY}"
  firecrawlApiUrl: "${FIRECRAWL_API_URL}"
  scraperProvider: "firecrawl"
  jinaApiKey: "${JINA_API_KEY}"
  jinaApiUrl: "${JINA_API_URL}"
  rerankerType: "jina"
  safeSearch: 1
  scraperTimeout: 5000
